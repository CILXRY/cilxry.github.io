name: Deploy Astro via Docker Compose

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # 根据你的 Astro 版本调整
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Determine Target Directory
        run: |
          if [ "$GITHUB_REF" == "refs/heads/main" ]; then
            echo "TARGET_DIR=/opt/astro-site/data/prod" >> $GITHUB_ENV
            echo "ENV_NAME=Production" >> $GITHUB_ENV
          else
            echo "TARGET_DIR=/opt/astro-site/data/dev" >> $GITHUB_ENV
            echo "ENV_NAME=Development" >> $GITHUB_ENV
          fi

      - name: Deploy to Server via Rsync
        run: |
          echo "🚀 Deploying to $ENV_NAME..."
          # 使用 rsync 同步文件，高效且稳定
          # -a: 归档模式
          # -v: 详细输出
          # -z: 压缩传输
          # --delete: 删除服务器上已不存在于本地的文件 (保持同步)
          rsync -avz --delete ./dist/ $SSH_USER@$SSH_HOST:$TARGET_DIR/
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
