name: 测试版本 纪事小栈部署

on:
  push:
    branches: [elegant]
  pull_request:
    branches: [elegant]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取纪事小栈
        uses: actions/checkout@v4

      - name: 拉取博客内容
        uses: actions/checkout@v4
        with:
          repository: CILXRY/cilxry-markdown-pages
          path: src/content
          token: ${{secrets.CILXRY_GITHUB_TOKEN}}

      - name: 部署 NodeJS 环境
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: 部署 pnpm 环境
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建纪事小栈
        run: pnpm run build

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: Dev-Env

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Create SSH key file
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Add server to known hosts
        run: |
          ssh-keyscan -p 22 -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PATH: ${{ secrets.SERVER_PATH }}
        run: |
          ssh -p 22 -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "mkdir -p $SERVER_PATH"
          rsync -avz --delete \
            -e "ssh -p 22 -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist/ \
            $SERVER_USER@$SERVER_HOST:$SERVER_PATH/

      - name: Cleanup SSH key
        run: rm -rf ~/.ssh/deploy_key
