name: 正式版本 纪事小栈部署

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # x.x.x 的tag
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取纪事小栈
        uses: actions/checkout@v4
        with:
          ref: ${{github.ref}}
          #ref: '0.1.0' # 测试用

      - name: 拉取博客内容
        uses: actions/checkout@v4
        with:
          repository: CILXRY/cilxry-markdown-pages
          path: src/content
          token: ${{secrets.CILXRY_GITHUB_TOKEN}}

      - name: 部署 NodeJS 环境
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: 部署 pnpm 环境
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装依赖
        run: pnpm i

      - name: 构造内容
        run: pnpm build

      - name: Test for output
        run: ls ./dist

      # - name: Upload artifact
      #   uses: actions/upload-pages-artifact@v3
      #   with:
      #     path: ./dist

